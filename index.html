<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holostik — Order Tracking Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --navy:   #1F4E79;
    --blue:   #2E75B6;
    --teal:   #008080;
    --amber:  #C07000;
    --green:  #1E7145;
    --red:    #C00000;
    --purple: #7030A0;
    --gray:   #F2F2F2;
    --dgray:  #595959;
    --white:  #FFFFFF;
    --border: #D9D9D9;
    --text:   #2C2C2A;
    --muted:  #737370;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 13px; background: #EEF2F7; color: var(--text); }

  /* ── Top bar ── */
  .topbar { background: var(--navy); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; }
  .topbar-title { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
  .topbar-sub   { font-size: 11px; opacity: .7; margin-top: 2px; }
  .topbar-right { font-size: 11px; opacity: .6; }
  #last-updated { color: #7FC9FF; font-weight: 600; }

  /* ── KPI row ── */
  .kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 16px 24px 0; }
  .kpi { background: #fff; border-radius: 10px; padding: 14px 18px; border-left: 4px solid; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  .kpi-val   { font-size: 28px; font-weight: 700; margin-top: 4px; line-height: 1; }
  .kpi.so    { border-color: var(--navy);  } .kpi.so  .kpi-val { color: var(--navy);  }
  .kpi.tdd   { border-color: var(--teal);  } .kpi.tdd .kpi-val { color: var(--teal);  }
  .kpi.disp  { border-color: var(--amber); } .kpi.disp.kpi-val { color: var(--amber); }
  .kpi.amt   { border-color: var(--green); } .kpi.amt .kpi-val { color: var(--green); font-size:20px; }

  /* ── Search bar ── */
  .search-bar { display: flex; gap: 10px; padding: 14px 24px; flex-wrap: wrap; align-items: flex-end; }
  .search-group { display: flex; flex-direction: column; gap: 4px; }
  .search-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .search-group input { height: 36px; border: 1.5px solid var(--border); border-radius: 7px; padding: 0 12px; font-size: 13px; width: 240px; outline: none; transition: border .15s; }
  .search-group input:focus { border-color: var(--navy); }
  .search-group input.so-inp { border-color: var(--amber); background: #FFFACD; font-weight: 600; }
  .search-group input.so-inp:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(192,112,0,.15); }
  .search-group input.txt-inp { border-color: var(--purple); }
  .search-group input.txt-inp:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(112,48,160,.15); }
  .btn-clear { height: 36px; padding: 0 16px; border: 1.5px solid var(--border); border-radius: 7px; background: #fff; cursor: pointer; font-size: 12px; color: var(--muted); }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* ── Section tabs ── */
  .tabs { display: flex; gap: 0; padding: 14px 24px 0; }
  .tab { padding: 8px 18px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 8px 8px 0 0; border: 1px solid transparent; border-bottom: none; color: var(--muted); background: transparent; transition: all .15s; }
  .tab.active { background: #fff; border-color: var(--border); color: var(--navy); }
  .tab:hover:not(.active) { color: var(--navy); }

  /* ── Table card ── */
  .card { background: #fff; margin: 0 24px 24px; border-radius: 0 10px 10px 10px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .row-count { font-size: 11px; color: var(--muted); background: var(--gray); padding: 2px 8px; border-radius: 20px; }

  /* ── Table ── */
  .tbl-wrap { overflow-x: auto; max-height: 520px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { position: sticky; top: 0; background: #F7F9FC; border-bottom: 2px solid var(--border); padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); white-space: nowrap; cursor: pointer; user-select: none; z-index: 10; }
  thead th:hover { color: var(--navy); }
  thead th .sort-icon { margin-left: 4px; opacity: .4; font-size: 10px; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--navy); }
  tbody tr { border-bottom: 1px solid #F0F0F0; transition: background .1s; }
  tbody tr:hover { background: #F0F7FF; }
  tbody td { padding: 8px 10px; vertical-align: top; max-width: 220px; }
  tbody td.wrap { white-space: normal; word-break: break-word; }
  tbody td.nowrap { white-space: nowrap; }
  .empty-row td { text-align: center; color: var(--muted); padding: 32px; font-size: 13px; }

  /* ── Status badges ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .badge.done  { background: #E2EFDA; color: var(--green); }
  .badge.pend  { background: #FCE4D6; color: var(--red); }
  .badge.na    { background: var(--gray); color: var(--muted); }

  /* ── SO detail panel ── */
  .detail-panel { display: none; margin: 0 24px 16px; background: #fff; border: 1.5px solid var(--amber); border-radius: 10px; overflow: hidden; }
  .detail-panel.visible { display: block; }
  .detail-hdr { background: var(--amber); color: #fff; padding: 10px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
  .detail-body { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
  .detail-section { padding: 14px 16px; border-right: 1px solid var(--border); }
  .detail-section:last-child { border-right: none; }
  .detail-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .detail-field { margin-bottom: 8px; }
  .detail-label { font-size: 10px; color: var(--muted); font-weight: 600; }
  .detail-val { font-size: 12px; color: var(--text); margin-top: 1px; word-break: break-word; }
  .status-row { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); background: #FAFAFA; }

  /* ── Loading / error ── */
  .loading { text-align: center; padding: 48px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #FCE4D6; border: 1px solid var(--red); border-radius: 8px; padding: 12px 16px; margin: 16px 24px; font-size: 12px; color: var(--red); }

  @media (max-width: 700px) {
    .kpi-row { grid-template-columns: repeat(2,1fr); }
    .detail-body { grid-template-columns: 1fr; }
    .search-group input { width: 180px; }
  }
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div>
    <div class="topbar-title">Holostik India Ltd — Order Tracking</div>
    <div class="topbar-sub">SO Released · TDD · Dispatch · Live from OneDrive</div>
  </div>
  <div class="topbar-right">Last updated: <span id="last-updated">—</span></div>
</div>

<!-- ── KPI row ── -->
<div class="kpi-row">
  <div class="kpi so">
    <div class="kpi-label">SO Lines</div>
    <div class="kpi-val" id="kpi-so">—</div>
  </div>
  <div class="kpi tdd">
    <div class="kpi-label">TDD Lines</div>
    <div class="kpi-val" id="kpi-tdd">—</div>
  </div>
  <div class="kpi disp">
    <div class="kpi-label">Dispatched</div>
    <div class="kpi-val" id="kpi-disp">—</div>
  </div>
  <div class="kpi amt">
    <div class="kpi-label">Total SO Amount</div>
    <div class="kpi-val" id="kpi-amt">—</div>
  </div>
</div>

<!-- ── Search ── -->
<div class="search-bar">
  <div class="search-group">
    <label>🔍 Search by SO Number</label>
    <input class="so-inp" id="so-search" type="text" placeholder="e.g. 27300101616" oninput="applyFilters()">
  </div>
  <div class="search-group">
    <label>🔎 Search any text</label>
    <input class="txt-inp" id="txt-search" type="text" placeholder="Customer, item, courier…" oninput="applyFilters()">
  </div>
  <button class="btn-clear" onclick="clearSearch()">✕ Clear</button>
</div>

<!-- ── SO Detail Panel ── -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-hdr">
    <span id="detail-so-num">SO Detail</span>
    <button onclick="closeDetail()" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:16px">✕</button>
  </div>
  <div class="detail-body">
    <div class="detail-section">
      <div class="detail-section-title" style="color:var(--navy)">📋 SO Released</div>
      <div id="detail-so"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title" style="color:var(--teal)">📅 TDD</div>
      <div id="detail-tdd"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title" style="color:var(--amber)">📦 Dispatch</div>
      <div id="detail-disp"></div>
    </div>
  </div>
  <div class="status-row" id="detail-status"></div>
</div>

<!-- ── Tabs ── -->
<div class="tabs">
  <div class="tab active" onclick="showTab('all')">All SOs</div>
  <div class="tab" onclick="showTab('so')">SO Log</div>
  <div class="tab" onclick="showTab('tdd')">TDD Log</div>
  <div class="tab" onclick="showTab('disp')">Dispatch Log</div>
</div>

<!-- ── Table card ── -->
<div class="card">
  <div class="card-header">
    <span class="card-title" id="card-title">All SOs — Linked View</span>
    <span class="row-count" id="row-count">0 rows</span>
  </div>
  <div class="tbl-wrap">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Loading data from GitHub…
    </div>
    <div id="error-area"></div>
    <table id="main-table" style="display:none">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
// ── CONFIG — update GITHUB_USER and REPO if needed ──────────
const GITHUB_USER = 'amitraina143-dev';
const REPO        = 'holostik-dashboard';
const BRANCH      = 'main';
const RAW         = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO}/${BRANCH}`;

const FILES = {
  so:   `${RAW}/so_log.csv`,
  tdd:  `${RAW}/tdd_log.csv`,
  disp: `${RAW}/dispatch_log.csv`,
};

// ── State ────────────────────────────────────────────────────
let DATA = { so: [], tdd: [], disp: [] };
let HEADERS = { so: [], tdd: [], disp: [] };
let currentTab = 'all';
let sortCol = -1, sortDir = 1;

// ── Load all CSVs ────────────────────────────────────────────
async function loadCSV(url) {
  const res = await fetch(url + '?t=' + Date.now());
  if (!res.ok) throw new Error(`${url} returned ${res.status}`);
  const text = await res.text();
  return new Promise(resolve => {
    Papa.parse(text, {
      header: true, skipEmptyLines: true,
      complete: r => resolve(r)
    });
  });
}

async function loadAll() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main-table').style.display = 'none';
  document.getElementById('error-area').innerHTML = '';
  try {
    const [so, tdd, disp] = await Promise.all([
      loadCSV(FILES.so), loadCSV(FILES.tdd), loadCSV(FILES.disp)
    ]);
    DATA.so   = so.data;   HEADERS.so   = so.meta.fields   || [];
    DATA.tdd  = tdd.data;  HEADERS.tdd  = tdd.meta.fields  || [];
    DATA.disp = disp.data; HEADERS.disp = disp.meta.fields || [];
    updateKPIs();
    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('en-IN');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-table').style.display = 'table';
    applyFilters();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-area').innerHTML =
      `<div class="error-msg">⚠️ Could not load CSV files from GitHub.<br>
      Make sure <strong>so_log.csv</strong>, <strong>tdd_log.csv</strong>, <strong>dispatch_log.csv</strong>
      exist in your repo <strong>${GITHUB_USER}/${REPO}</strong> and the repo is public.<br>
      Error: ${e.message}</div>`;
  }
}

// ── KPIs ─────────────────────────────────────────────────────
function updateKPIs() {
  document.getElementById('kpi-so').textContent   = DATA.so.length.toLocaleString('en-IN');
  document.getElementById('kpi-tdd').textContent  = DATA.tdd.length.toLocaleString('en-IN');
  document.getElementById('kpi-disp').textContent = DATA.disp.length.toLocaleString('en-IN');
  const soAmtCol = HEADERS.so.find(h => h.toLowerCase().includes('amount'));
  const total = soAmtCol
    ? DATA.so.reduce((s,r) => s + (parseFloat((r[soAmtCol]||'').replace(/,/g,''))||0), 0)
    : 0;
  document.getElementById('kpi-amt').textContent = total > 0
    ? 'Rs.' + Math.round(total).toLocaleString('en-IN')
    : '—';
}

// ── Helpers ───────────────────────────────────────────────────
function soKey(row) {
  return (row['SO Number'] || row['SO No.'] || row['Sales Order No.'] || '').toString().trim();
}

function findInTable(table, soNum, keyFn) {
  return table.find(r => (keyFn ? keyFn(r) : soKey(r)) === soNum.trim()) || null;
}

function indicator(label, found, bg) {
  const icon = found ? '✔' : '✘';
  const clr  = found ? 'var(--green)' : 'var(--red)';
  const bgClr= found ? '#E2EFDA' : '#FCE4D6';
  return `<span class="badge" style="background:${bgClr};color:${clr}">${icon} ${label}</span>`;
}

function rowContains(row, txt) {
  return Object.values(row).some(v => v && v.toString().toLowerCase().includes(txt));
}

// ── Tab switching ─────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['all','so','tdd','disp'][i] === tab);
  });
  sortCol = -1; sortDir = 1;
  applyFilters();
}

// ── Filter + render ───────────────────────────────────────────
function applyFilters() {
  const soQ  = document.getElementById('so-search').value.trim();
  const txtQ = document.getElementById('txt-search').value.trim().toLowerCase();

  if (currentTab === 'all') renderAllView(soQ, txtQ);
  else if (currentTab === 'so')   renderTable(DATA.so,   HEADERS.so,   soQ, txtQ, 'SO Log');
  else if (currentTab === 'tdd')  renderTable(DATA.tdd,  HEADERS.tdd,  soQ, txtQ, 'TDD Log');
  else if (currentTab === 'disp') renderTable(DATA.disp, HEADERS.disp, soQ, txtQ, 'Dispatch Log');

  // Show detail panel if SO number entered
  if (soQ.length >= 5) showDetail(soQ);
  else closeDetail();
}

// ── All-in-one view ───────────────────────────────────────────
function renderAllView(soQ, txtQ) {
  document.getElementById('card-title').textContent = 'All SOs — Linked View (SO + TDD + Dispatch)';

  // Build unified rows from SO Log
  let rows = DATA.so.map(soRow => {
    const soNum = soKey(soRow);
    const tddRow  = findInTable(DATA.tdd,  soNum, r => (r['SO No.']||'').trim());
    const dispRow = findInTable(DATA.disp, soNum, r => (r['Sales Order No.']||'').trim());
    return { soRow, tddRow, dispRow, soNum };
  });

  // Filter
  if (soQ) rows = rows.filter(r => r.soNum.includes(soQ.trim()));
  if (txtQ) rows = rows.filter(r =>
    rowContains(r.soRow, txtQ) ||
    (r.tddRow && rowContains(r.tddRow, txtQ)) ||
    (r.dispRow && rowContains(r.dispRow, txtQ))
  );

  // Also include SO numbers from TDD / Dispatch not in SO Log
  if (txtQ && !soQ) {
    DATA.tdd.filter(r => rowContains(r, txtQ)).forEach(r => {
      const n = (r['SO No.']||'').trim();
      if (n && !rows.find(x => x.soNum === n))
        rows.push({ soRow: {}, tddRow: r, dispRow: null, soNum: n });
    });
    DATA.disp.filter(r => rowContains(r, txtQ)).forEach(r => {
      const n = (r['Sales Order No.']||'').trim();
      if (n && !rows.find(x => x.soNum === n))
        rows.push({ soRow: {}, tddRow: null, dispRow: r, soNum: n });
    });
  }

  document.getElementById('row-count').textContent = rows.length + ' rows';

  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');
  thead.innerHTML = `<tr>
    <th>SO Number</th>
    <th>Customer</th>
    <th>Item Description</th>
    <th>SO Qty</th>
    <th>Amount</th>
    <th>Sales Person</th>
    <th>TDD 1</th>
    <th>Rem. Qty</th>
    <th>Invoice No.</th>
    <th>Dispatch Date</th>
    <th>Courier</th>
    <th>POD / LR No.</th>
    <th style="text-align:center">SO</th>
    <th style="text-align:center">TDD</th>
    <th style="text-align:center">Dispatched</th>
  </tr>`;

  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="15">No records found — try a different search</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(({soRow, tddRow, dispRow, soNum}, i) => {
    const s = soRow, t = tddRow||{}, d = dispRow||{};
    const soFound   = !!Object.keys(soRow).length;
    const tddFound  = !!tddRow;
    const dispFound = !!dispRow;
    return `<tr onclick="showDetail('${soNum}')" style="cursor:pointer">
      <td class="nowrap" style="font-weight:600;color:var(--navy)">${soNum||'—'}</td>
      <td class="wrap" style="max-width:180px">${s['Bill-To Customer']||s['Sell-To Customer']||'—'}</td>
      <td class="wrap">${s['Item Description']||d['Item Description']||'—'}</td>
      <td class="nowrap">${s['Quantity']||t['SO Qty']||'—'}</td>
      <td class="nowrap">${s['Amount']||'—'}</td>
      <td class="nowrap">${s['Sales Person']||'—'}</td>
      <td class="nowrap" style="color:var(--teal);font-weight:600">${t['TDD 1']||'—'}</td>
      <td class="nowrap">${t['Remaining Qty']||'—'}</td>
      <td class="nowrap" style="color:var(--amber)">${d['Invoice No.']||'—'}</td>
      <td class="nowrap">${d['Dispatch Date']||'—'}</td>
      <td class="nowrap">${d['Courier / Transporter']||'—'}</td>
      <td class="nowrap">${d['POD / LR No.']||'—'}</td>
      <td style="text-align:center"><span class="badge ${soFound?'done':'pend'}">${soFound?'✔':'✘'}</span></td>
      <td style="text-align:center"><span class="badge ${tddFound?'done':'pend'}">${tddFound?'✔':'✘'}</span></td>
      <td style="text-align:center"><span class="badge ${dispFound?'done':'pend'}">${dispFound?'✔':'✘'}</span></td>
    </tr>`;
  }).join('');
}

// ── Single table view ─────────────────────────────────────────
function renderTable(data, headers, soQ, txtQ, title) {
  document.getElementById('card-title').textContent = title;
  let rows = [...data];
  if (soQ) rows = rows.filter(r => Object.values(r).some(v => v && v.toString().includes(soQ.trim())));
  if (txtQ) rows = rows.filter(r => rowContains(r, txtQ));
  if (sortCol >= 0 && headers[sortCol]) {
    const k = headers[sortCol];
    rows.sort((a,b) => {
      const av = (a[k]||'').toString(), bv = (b[k]||'').toString();
      return av.localeCompare(bv, undefined, {numeric:true}) * sortDir;
    });
  }
  document.getElementById('row-count').textContent = rows.length + ' rows';

  const thead = document.getElementById('table-head');
  thead.innerHTML = '<tr>' + headers.map((h,i) =>
    `<th class="${sortCol===i?'sorted':''}" onclick="sortBy(${i})">
      ${h} <span class="sort-icon">${sortCol===i?(sortDir>0?'▲':'▼'):'⇅'}</span>
    </th>`
  ).join('') + '</tr>';

  const tbody = document.getElementById('table-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="' + headers.length + '">No records found</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(row =>
    '<tr>' + headers.map(h =>
      `<td class="${(row[h]||'').length > 30 ? 'wrap' : 'nowrap'}">${row[h]||'—'}</td>`
    ).join('') + '</tr>'
  ).join('');
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  applyFilters();
}

// ── Detail panel ──────────────────────────────────────────────
function showDetail(soNum) {
  if (!soNum || soNum.length < 5) return;
  const soRow   = findInTable(DATA.so, soNum);
  const tddRow  = findInTable(DATA.tdd,  soNum, r => (r['SO No.']||'').trim());
  const dispRow = findInTable(DATA.disp, soNum, r => (r['Sales Order No.']||'').trim());

  if (!soRow && !tddRow && !dispRow) return;

  document.getElementById('detail-so-num').textContent = 'SO ' + soNum + ' — Full Detail';

  function fields(row, keys) {
    if (!row) return '<div style="color:var(--muted);font-size:12px;padding:8px 0">Not found in this tracker</div>';
    return keys.map(([label, key]) => {
      const v = row[key] || '—';
      return `<div class="detail-field">
        <div class="detail-label">${label}</div>
        <div class="detail-val">${v}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('detail-so').innerHTML = fields(soRow, [
    ['Customer','Bill-To Customer'],['PO Detail','PO Detail'],
    ['Item','Item Description'],['Qty','Quantity'],
    ['Amount','Amount'],['Salesperson','Sales Person'],
    ['Payment Term','Payment Term'],['Billing Block','Billing Block'],
  ]);

  document.getElementById('detail-tdd').innerHTML = fields(tddRow, [
    ['SO Released Date','SO Released Date'],['SO Qty','SO Qty'],
    ['Remaining Qty','Remaining Qty'],['TDD 1','TDD 1'],
    ['TDD 1 Remarks','TDD 1 Remarks'],['TDD 2','TDD 2'],
    ['TDD 3','TDD 3'],
  ]);

  document.getElementById('detail-disp').innerHTML = fields(dispRow, [
    ['Invoice No.','Invoice No.'],['Invoice Date','Invoice Date'],
    ['Qty Dispatched','Qty'],['Courier','Courier / Transporter'],
    ['Mode','Mode'],['POD / LR No.','POD / LR No.'],
    ['Dispatch Date','Dispatch Date'],
  ]);

  document.getElementById('detail-status').innerHTML =
    indicator('SO Released', !!soRow,   'var(--navy)') +
    indicator('TDD Set',     !!tddRow,  'var(--teal)') +
    indicator('Dispatched',  !!dispRow, 'var(--amber)');

  document.getElementById('detail-panel').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
}

function clearSearch() {
  document.getElementById('so-search').value  = '';
  document.getElementById('txt-search').value = '';
  closeDetail();
  applyFilters();
}

// ── Init ──────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
